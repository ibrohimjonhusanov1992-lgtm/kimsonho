backend:
  name: git-gateway
  branch: main

media_folder: uploads
public_folder: /uploads

collections:
  - name: promo
    label: Aksiyalar
    files:
      - file: promo.json
        label: Tepadagi aksiya xabarlari
        name: promo
        fields:
          - label: Aksiyalar royxati
            name: items
            widget: list
            fields:
              - label: Matn
                name: text
                widget: string
              - label: Rasm
                name: image
                widget: image
                required: false

  - name: products
    label: Mahsulotlar
    files:
      - file: products.json
        label: Mahsulotlar royxati
        name: products
        fields:
          - label: Mahsulotlar
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string
              - label
