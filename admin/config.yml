backend:
  name: git-gateway
  branch: main

media_folder: uploads
public_folder: /uploads

collections:
  - name: banners
    label: Bannerlar
    files:
      - file: banners.json
        label: Tepadagi banner slaydlari
        name: banners
        fields:
          - label: Slaydlar
            name: items
            widget: list
            fields:
              - label: Nishon matni (masalan YANGI yoki -10%)
                name: badge
                widget: string
                required: false

              - label: Kichik sarlavha
                name: eyebrow
                widget: string
                required: false

              - label: Katta sarlavha
                name: title
                widget: string

              - label: Qisqa matn
                name: subtitle
                widget: string
                required: false

              - label: Tugma matni
                name: button
                widget: string
                required: false

              - label: Fon rasmi
                name: image
                widget: image
                required: false

              - label: Fon rangi
                name: color
                widget: select
                options:
                  - green
                  - olive
                  - gold
                required: false

  - name: midbanners
    label: Ortadagi reklama bannerlari
    files:
      - file: midbanners.json
        label: BEST va NEW dan keyingi bannerlar
        name: midbanners
        fields:
          - label: Best dan keyingi banner rasmi
            name: afterBest
            widget: image
            required: false

          - label: New dan keyingi banner rasmi
            name: afterNew
            widget: image
            required: false

  - name: adbanners
    label: Reklama bannerlari
    files:
      - file: adbanners.json
        label: BEST / NEW / EVENT orasidagi bannerlar
        name: adbanners
        fields:
          - label: Banner 1
            name: banner1
            widget: image
            required: false

          - label: Banner 2
            name: banner2
            widget: image
            required: false

          - label: Banner 3
            name: banner3
            widget: image
            required: false

  - name: products
    label: Mahsulotlar
    files:
      - file: products.json
        label: Mahsulotlar ro'yxati
        name: products
        fields:
          - label: Mahsulotlar
            name: items
            widget: list
            fields:
              - label: ID
                name: id
                widget: string

              - label: Turkum
                name: tag
                widget: string

              - label: Bo'lim
                name: section
                widget: select
                options:
                  - BEST
                  - NEW
                  - EVENT
                default: BEST

              - label: Nomi
                name: name
                widget: string

              - label: Qisqa tavsif
                name: desc
                widget: string

              - label: Batafsil tavsif
                name: details
                widget: text
                required: false

              - label: Narx
                name: price
                widget: number

              - label: Chegirma (%)
                name: discount
                widget: number
                required: false

              - label: Rang uslubi
                name: art
                widget: select
                options:
                  - art-1
                  - art-2
                  - art-3
                  - art-4

              - label: Rasm 1
                name: image1
                widget: image
                required: false

              - label: Rasm 2
                name: image2
                widget: image
                required: false

              - label: Rasm 3
                name: image3
                widget: image
                required: false
