backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "products"
    label: "Mahsulotlar"
    files:
      - file: "products.json"
        label: "Mahsulotlar royxati"
        name: "products"
        fields:
          - { label: "Mahsulotlar", name: "items", widget: "list", fields: [
              { label: "ID", name: "id", widget: "string" },
              { label: "Turkum (masalan Seram, Toner)", name: "tag", widget: "string" },
              { label: "Nomi", name: "name", widget: "string" },
              { label: "Tavsif", name: "desc", widget: "string" },
              { label: "Narx som, faqat raqam", name: "price", widget: "number" },
              { label: "Rang uslubi", name: "art", widget: "select", options: ["art-1","art-2","art-3","art-4"] }
            ]}
